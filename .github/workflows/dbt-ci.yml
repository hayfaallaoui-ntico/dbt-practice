name: dbt CI

on:
  pull_request:
    branches: [main]

jobs:
  dbt-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-duckdb
        run: pip install dbt-duckdb==1.10.1

      - name: Create profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<EOF
          dbt_project:
            target: ci
            outputs:
              ci:
                type: duckdb
                path: ci.duckdb
                threads: 4
                schema: ci
          EOF

      - name: Install dependencies
        run: dbt deps

      - name: Debug
        run: dbt debug --target ci

      - name: Build
        run: dbt build --target ci

#Ce que fait cette CI

#Quand tu ouvres une PR vers main :

#GitHub récupère le code

#installe dbt

#crée un profiles.yml temporaire

#exécute dbt build --target ci